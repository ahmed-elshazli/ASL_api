version: "3.9"

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nutrition_platform_prod
    restart: unless-stopped

    expose:
      - "3000"

    env_file:
      - .env

    environment:
      NODE_ENV: production

    mem_limit: 512m
    cpus: 1

    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - backend

  nginx:
    image: nginx:stable-alpine
    container_name: nginx_proxy
    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - app

    networks:
      - backend

  mongo:
    image: mongo:7
    restart: unless-stopped

    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}

    volumes:
      - mongo_prod:/data/db

    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 5

    networks:
      - backend

  redis:
    image: redis:7-alpine
    restart: unless-stopped

    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes

    volumes:
      - redis_prod:/data

    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

    networks:
      - backend

volumes:
  mongo_prod:
  redis_prod:

networks:
  backend:
    driver: bridge